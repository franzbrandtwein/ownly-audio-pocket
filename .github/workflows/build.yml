name: Build Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04   # glibc 2.31 — läuft als Docker-Container auf dem 22.04-Runner
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install git and base tools
        run: apt-get update -q && apt-get install -y git ca-certificates wget curl

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get install -y python3 python3-pip \
            libgl1-mesa-glx libglib2.0-0 \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 libsdl2-ttf-2.0-0 \
            libmtdev1 libgstreamer1.0-0 gstreamer1.0-plugins-base \
            libgles2-mesa

      - name: Install Python packages
        run: |
          pip3 install --upgrade pip
          pip install "kivy[base]" pyinstaller mutagen opencv-python-headless

      - name: Build with PyInstaller
        run: python3 -m PyInstaller kivy_app.spec --distpath dist --workpath /tmp/build --noconfirm

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/ownly-audio-pocket AppDir/usr/bin/ownly-audio-pocket
          printf '[Desktop Entry]\nName=Ownly Audio Pocket\nExec=ownly-audio-pocket\nIcon=ownly-audio-pocket\nType=Application\nCategories=Audio;Music;Player;\n' \
            > AppDir/ownly-audio-pocket.desktop
          cp icon.png AppDir/ownly-audio-pocket.png
          cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ownly-audio-pocket.png
          cp AppDir/ownly-audio-pocket.desktop AppDir/usr/share/applications/
          printf '#!/bin/bash\nexec "$APPDIR/usr/bin/ownly-audio-pocket" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./appimagetool-x86_64.AppImage AppDir ownly-audio-pocket.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: ownly-audio-pocket-linux
          path: ownly-audio-pocket.AppImage

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Disable Windows Defender realtime scan
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "kivy[base]" kivy_deps.sdl2 kivy_deps.glew pyinstaller mutagen opencv-python-headless

      - name: Build
        run: |
          python -m PyInstaller kivy_app.spec `
            --distpath dist --workpath C:\tmp\build --noconfirm

      - name: Rename binary
        shell: pwsh
        run: Rename-Item dist\ownly-audio-pocket.exe ownly-audio-pocket-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ownly-audio-pocket-windows
          path: dist\ownly-audio-pocket-windows.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: "Automatisch gebaut aus Commit ${{ github.sha }}"
          files: |
            artifacts/ownly-audio-pocket-linux/ownly-audio-pocket.AppImage
            artifacts/ownly-audio-pocket-windows/ownly-audio-pocket-windows.exe
