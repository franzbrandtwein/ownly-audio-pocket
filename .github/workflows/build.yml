name: Build Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller mutagen cryptography PyQt5 qrcode[pil]

      - name: Install Qt system libs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Build
        run: |
          python -m PyInstaller ownly.spec \
            --distpath dist --workpath /tmp/build --noconfirm

      - name: Rename binary
        run: mv dist/ownly-audio-pocket dist/ownly-audio-pocket-linux

      - uses: actions/upload-artifact@v4
        with:
          name: ownly-audio-pocket-linux
          path: dist/ownly-audio-pocket-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller mutagen cryptography PyQt5 qrcode[pil]

      - name: Build
        run: |
          python -m PyInstaller ownly.spec `
            --distpath dist --workpath C:\tmp\build --noconfirm

      - name: Rename binary
        run: Rename-Item dist\ownly-audio-pocket.exe ownly-audio-pocket-windows.exe
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ownly-audio-pocket-windows
          path: dist\ownly-audio-pocket-windows.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: "Automatisch gebaut aus Commit ${{ github.sha }}"
          files: |
            artifacts/ownly-audio-pocket-linux/ownly-audio-pocket-linux
            artifacts/ownly-audio-pocket-windows/ownly-audio-pocket-windows.exe
